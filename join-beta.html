<body>
  <main style="max-width:740px;width:100%">
    <h1 style="text-align:center;margin-bottom:12px">Join Beta — Revue</h1>
    <p style="text-align:center;margin-bottom:24px">Fill the form below to join our beta. This page contains the original Brevo form.</p>

    <!-- Brevo form (same markup used on main page) -->
    <div class="sib-form" style="text-align: center;">
      <div id="sib-form-container" class="sib-form-container">
        <div id="sib-container" class="sib-container--large sib-container--vertical" style="max-width:540px; margin:0 auto; text-align:center; background-color:rgba(255,255,255,1); border-width:1px; border-style:solid; border-color:#C0CCD9; border-radius:6px; padding:18px; direction:ltr">
          <form id="sib-form" method="POST" action="https://3770dcb0.sibforms.com/serve/MUIFADL3QcvbpLLQZAjo_q7oBAQrnjwZBWNQ74wl1GZ0X0g4dMV3sHVN7yhqlSj45Y6rxWHhmgO2B4byqE6wdCVAwC_1kQcIGlPyeXabMM8WsieGhNlJ2XMO9gNm4l-sL5LY8sYFgfr54syA75X0bzx0cJLmDCKrP7dF_RD_RY-LYK8zyFtw0jWrRvsPDIPZRjyOxlOrT4pAWnmSSw==" data-type="subscription">
            <div class="sib-form-block" style="padding: 8px 0;">
              <div class="sib-form-block" style="font-family:Helvetica, sans-serif; font-size:28px; font-weight:700; text-align:left; color:#3C4858; background-color:transparent;">Join Beta - Revue</div>
            </div>
            <div class="sib-form-block" style="padding: 8px 0;">
              <div class="sib-form-block" style="font-family:Helvetica, sans-serif; font-size:15px; text-align:left; color:#3C4858; background-color:transparent;">
                <p>For getting early access to Products, Offers and Promotion Activities</p>
              </div>
            </div>
            <div class="sib-input sib-form-block" style="padding: 8px 0;">
              <div class="form__entry">
                <label class="entry__label" for="EMAIL" style="display:block;font-weight:700;margin-bottom:6px">Enter your email address to Join</label>
                <input class="input" type="email" id="EMAIL" name="EMAIL" autocomplete="off" placeholder="EMAIL" required style="width:100%;padding:10px;border:1px solid #cbd5e1;border-radius:4px;">
                <div class="entry__error entry__error--primary" style="display:none"></div>
              </div>
            </div>
            <div class="sib-input sib-form-block" style="padding: 8px 0;">
              <div class="form__entry">
                <label class="entry__label" for="FIRSTNAME" style="display:block;font-weight:700;margin-bottom:6px">Enter your Name</label>
                <input class="input" maxlength="200" type="text" id="FIRSTNAME" name="FIRSTNAME" autocomplete="off" placeholder="Name" required style="width:100%;padding:10px;border:1px solid #cbd5e1;border-radius:4px;">
                <div class="entry__error entry__error--primary" style="display:none"></div>
              </div>
            </div>
            <div class="sib-input sib-form-block" style="padding: 8px 0;">
              <div class="form__entry">
                <label class="entry__label" for="JOB_TITLE" style="display:block;font-weight:700;margin-bottom:6px">Enter your Job Title</label>
                <input class="input" maxlength="200" type="text" id="JOB_TITLE" name="JOB_TITLE" autocomplete="off" placeholder="Job Title" style="width:100%;padding:10px;border:1px solid #cbd5e1;border-radius:4px;">
                <div class="entry__error entry__error--primary" style="display:none"></div>
              </div>
            </div>
            <div class="sib-checkbox-group sib-form-block" style="padding: 8px 0;">
              <div class="form__entry">
                <label class="entry__label" style="display:block;font-weight:700;margin-bottom:6px">Which feature/s of Revue is most useful for you</label>
                <label class="checkbox__label"><input type="checkbox" name="CHECKBOX[]" value="File and Asset Management Feature" data-value="File and Asset Management Feature"> File and Asset Management Feature</label><br>
                <label class="checkbox__label"><input type="checkbox" name="CHECKBOX[]" value="Designer Overview" data-value="Designer Overview"> Designer Overview</label><br>
                <label class="checkbox__label"><input type="checkbox" name="CHECKBOX[]" value="Client Communication and Annotation Tool" data-value="Client Communication and Annotation Tool"> Client Communication and Annotation Tool</label><br>
                <label class="checkbox__label"><input type="checkbox" name="CHECKBOX[]" value="Automated QC Checks" data-value="Automated QC Checks"> Automated QC Checks</label><br>
                <label class="checkbox__label"><input type="checkbox" name="CHECKBOX[]" value="All of the above" data-value="All of the above"> All of the above</label>
                <div class="entry__error entry__error--primary" style="display:none"></div>
              </div>
            </div>
            <div class="sib-form-block" style="padding: 8px 0;text-align:left">
              <button class="sib-form-block__button" type="submit" style="padding:12px 18px;background:#374151;color:#fff;border:0;border-radius:6px;font-weight:700">Join</button>
            </div>
            <input type="hidden" name="locale" value="en">
            <input type="hidden" name="email_address_check" value="">
            <div id="success-message" class="sib-form-message-panel" style="display:none"></div>
            <div id="error-message" class="sib-form-message-panel" style="display:none"></div>
            <div class="sib-loader" style="display:none"></div>
          </form>
        </div>
      </div>

  <!-- Brevo scripts: set globals, then load runtime only when form exists -->
  <script>
    window.REQUIRED_CODE_ERROR_MESSAGE = 'Please choose a country code';
    window.LOCALE = 'en';
    window.EMAIL_INVALID_MESSAGE = window.SMS_INVALID_MESSAGE = "The information provided is invalid. Please review the field format and try again.";
    window.REQUIRED_ERROR_MESSAGE = "This field cannot be left blank. ";
    window.translation = { common: { selectedList: '{quantity} list selected' } };
    var AUTOHIDE = Boolean(0);

    (function loadBrevoWhenReady() {
      function loadScript() {
        if (!document.getElementById('sib-container')) return;
        var s = document.createElement('script');
        s.src = 'https://sibforms.com/forms/end-form/build/main.js';
        s.defer = true;
        document.body.appendChild(s);
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', loadScript);
      } else {
        loadScript();
      }
    })();
  </script>
